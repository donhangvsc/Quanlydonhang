<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> CƯỜNG - BÌNH PHƯỚC </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #f1f5f9; 
            overscroll-behavior-y: contain;
        }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .active-tab { color: #1e3a8a; transform: translateY(-4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .bill-container {
            width: 800px;
            background: white;
            padding: 40px;
            color: #1e293b;
            position: relative;
            border: 15px solid #1e3a8a;
            outline: 2px solid #1e3a8a;
            outline-offset: -20px;
        }
        .bill-navy { color: #1e3a8a; }
        .bill-border-navy { border-color: #1e3a8a; }
        .pre-wrap { white-space: pre-wrap; word-break: break-word; }
        
        /* Chế độ tư vấn */
        .consult-active { border-color: #1e3a8a; background-color: #eff6ff; }
        .pulse-consult { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(30, 58, 138, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(30, 58, 138, 0); }
            100% { box-shadow: 0 0 0 0 rgba(30, 58, 138, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SearchIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const HomeIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>;
        const ChartIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const StarIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

        function App() {
            const [view, setView] = useState('pos');
            const [cart, setCart] = useState([]);
            const [customer, setCustomer] = useState('Khách lẻ');
            const [orderNote, setOrderNote] = useState('');
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');
            const [cloudData, setCloudData] = useState({ products: [], customers: [], sales: [] });
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('KC_POS_URL') || '');
            const [loading, setLoading] = useState(false);
            const [showBill, setShowBill] = useState(false);
            const [billImg, setBillImg] = useState(null);
            const [previewData, setPreviewData] = useState(null);
            
            // Chế độ Tư vấn
            const [consultMode, setConsultMode] = useState(false);
            const [consultingItem, setConsultingItem] = useState(null);
            
            const [selectingItem, setSelectingItem] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [inputQty, setInputQty] = useState(1);
            const [inputNote, setInputNote] = useState('');

            const receiptRef = useRef(null);
            const cartEndRef = useRef(null);

            useEffect(() => { if (sheetUrl) fetchData(); }, []);

            const fetchData = async () => {
                if (!sheetUrl) return;
                setLoading(true);
                try {
                    const res = await fetch(`${sheetUrl}?action=getData&_t=${Date.now()}`);
                    const data = await res.json();
                    setCloudData(data);
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const filteredCustomers = useMemo(() => {
                if (!custSearch) return [];
                return cloudData.customers.filter(c => c.name.toLowerCase().includes(custSearch.toLowerCase()));
            }, [custSearch, cloudData.customers]);

            const filteredProducts = useMemo(() => {
                return cloudData.products.filter(p => p.name.toLowerCase().includes(prodSearch.toLowerCase()));
            }, [prodSearch, cloudData.products]);

            const handleProductClick = (product) => {
                if (consultMode) {
                    setConsultingItem(product);
                } else {
                    handleSelectItem(product);
                }
            };

            const handleSelectItem = (product) => {
                setSelectingItem(product);
                setIsEditing(false);
                setInputQty(1);
                const promo = product.KM || product.khuyenmai || product.ghichu || "";
                setInputNote(promo);
            };

            const handleEditCartItem = (item, index) => {
                setSelectingItem({ ...item, cartIndex: index });
                setIsEditing(true);
                setInputQty(item.qty);
                setInputNote(item.note || '');
            };

            const handleUpdateCart = () => {
                const qty = parseFloat(inputQty) || 1;
                if (isEditing) {
                    const newCart = [...cart];
                    newCart[selectingItem.cartIndex] = {
                        ...newCart[selectingItem.cartIndex],
                        qty: qty,
                        note: inputNote
                    };
                    setCart(newCart);
                } else {
                    setCart([...cart, { 
                        ...selectingItem, 
                        qty: qty, 
                        note: inputNote, 
                        appliedPrice: selectingItem.price, 
                        id: Date.now(),
                        tl: selectingItem.TL || selectingItem.tl || ''
                    }]);
                    setTimeout(() => cartEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                }
                setSelectingItem(null);
                setConsultingItem(null);
            };

            const saveOrder = async () => {
                if (!sheetUrl || cart.length === 0) return;
                setLoading(true);
                const total = cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0);
                const details = cart.map(i => `${i.name} (x${i.qty}) [Giá:${i.appliedPrice}] [TL:${i.tl || ''}] [Ghi chú:${i.note || ''}]`).join(', ');
                const orderData = { action: 'saveOrder', customer, note: orderNote, total, details };
                
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                    setShowBill(true);
                    setTimeout(async () => {
                        if (receiptRef.current) {
                            const canvas = await html2canvas(receiptRef.current, { scale: 2 });
                            setBillImg(canvas.toDataURL('image/png'));
                        }
                        setLoading(false);
                    }, 1000);
                } catch (e) { alert("Lỗi lưu đơn!"); setLoading(false); }
            };

            const handleViewHistory = (sale) => {
                setLoading(true);
                const items = (sale.details || "").split(', ').map((str, idx) => {
                    const name = str.split(' (x')[0];
                    const qty = parseFloat(str.split('(x')[1]?.split(')')[0]) || 0;
                    const price = parseFloat(str.split('[Giá:')[1]?.split(']')[0]) || 0;
                    const tl = str.split('[TL:')[1]?.split(']')[0] || '';
                    const note = str.split('[Ghi chú:')[1]?.split(']')[0] || '';
                    return { id: idx, name, qty, appliedPrice: price, tl, note };
                });

                setPreviewData({
                    customer: sale.customer || sale['Khách hàng'],
                    note: sale.note || sale['Ghi chú'] || '',
                    date: new Date(sale.date || sale['Ngày']).toLocaleString('vi-VN'),
                    total: sale.total || sale['Tổng'],
                    items: items,
                    id: 'HD' + Date.now().toString().slice(-8)
                });
                setShowBill(true);
                setTimeout(async () => {
                    if (receiptRef.current) {
                        const canvas = await html2canvas(receiptRef.current, { scale: 2 });
                        setBillImg(canvas.toDataURL('image/png'));
                    }
                    setLoading(false);
                }, 800);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden bg-slate-50">
                    <header className="px-5 py-4 bg-white flex justify-between items-center z-20 shadow-sm border-b">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-black text-blue-900 uppercase leading-none tracking-tighter">CƯỜNG - BÌNH PHƯỚC</h1>
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lên đơn AFAHU</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button 
                                onClick={() => setConsultMode(!consultMode)} 
                                className={`flex items-center gap-1.5 px-3 py-2 rounded-full transition-all ${consultMode ? 'bg-blue-900 text-white pulse-consult' : 'bg-slate-100 text-slate-400'}`}
                            >
                                <StarIcon />
                                <span className="text-[10px] font-black uppercase tracking-tighter">{consultMode ? 'ĐANG TƯ VẤN' : 'TƯ VẤN'}</span>
                            </button>
                            <button onClick={fetchData} className={`p-2 bg-slate-50 rounded-full ${loading ? 'animate-spin' : ''}`}>🔄</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-48 no-scrollbar scroll-smooth">
                        {view === 'pos' && (
                            <div className="space-y-4 animate-up">
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><SearchIcon /></div>
                                    <input className="w-full pl-11 pr-4 py-4 glass-card outline-none text-sm font-bold shadow-sm" placeholder="Tìm tên khách hàng..." value={custSearch} onChange={e => setCustSearch(e.target.value)} />
                                </div>
                                
                                {filteredCustomers.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {filteredCustomers.map((c, i) => (
                                            <button key={i} onClick={() => { setCustomer(c.name); setOrderNote(c.note || ''); setCustSearch(''); }} className="px-4 py-2 bg-blue-900 text-white rounded-full text-[10px] font-bold uppercase shadow-md whitespace-nowrap">{c.name}</button>
                                        ))}
                                    </div>
                                )}

                                <div className="glass-card p-5 border-l-8 border-blue-900 shadow-sm space-y-3">
                                    <div>
                                        <span className="text-[10px] font-black text-slate-300 uppercase">Khách hàng</span>
                                        <input className="w-full font-bold text-xl bg-transparent outline-none text-blue-900 border-b border-slate-100" value={customer} onChange={e => setCustomer(e.target.value)} />
                                    </div>
                                    <div>
                                        <span className="text-[10px] font-black text-slate-300 uppercase">Thông tin ghi chú (Địa chỉ, SĐT...)</span>
                                        <textarea 
                                            className="w-full text-xs font-bold text-slate-400 bg-transparent outline-none mt-1 min-h-[60px] resize-none leading-relaxed" 
                                            value={orderNote} 
                                            onChange={e => setOrderNote(e.target.value)} 
                                            placeholder="Ghi chú thêm thông tin cho đơn hàng này..."
                                        />
                                    </div>
                                </div>

                                <div className="space-y-3 pt-2">
                                    <div className="flex justify-between items-center px-1">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sản phẩm tại cửa hàng</div>
                                        {consultMode && <span className="text-[9px] font-bold text-blue-800 animate-pulse italic">Chế độ xem ưu điểm đang bật</span>}
                                    </div>
                                    
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-4 flex items-center text-slate-400"><SearchIcon /></div>
                                        <input className="w-full pl-11 pr-4 py-4 glass-card outline-none text-sm font-bold shadow-sm border focus:border-blue-200" placeholder="Tìm nhanh sản phẩm..." value={prodSearch} onChange={e => setProdSearch(e.target.value)} />
                                    </div>
                                    
                                    <div className="flex flex-col gap-3">
                                        {filteredProducts.map((p, i) => (
                                            <button key={i} onClick={() => handleProductClick(p)} className={`glass-card p-4 text-left active:scale-[0.98] transition border flex justify-between items-center group ${consultMode ? 'border-blue-300 bg-blue-50/50' : 'border-transparent'}`}>
                                                <div className="flex-1 pr-2">
                                                    <div className="text-sm font-black text-slate-800 uppercase mb-1">{p.name}</div>
                                                    <div className="flex flex-col gap-1">
                                                        {(p.TL || p.tl) && <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">📦 {p.TL || p.tl}</div>}
                                                        <div className="text-lg font-black text-blue-900 italic">{Number(p.price).toLocaleString()}đ</div>
                                                        {(p.KM || p.khuyenmai || p.ghichu) && (
                                                            <div className="mt-1">
                                                                <span className="text-[9px] font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-md border border-red-100 uppercase inline-block">🎁 KM: {p.KM || p.khuyenmai || p.ghichu}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold transition-all shadow-inner ${consultMode ? 'bg-blue-900 text-white' : 'bg-blue-50 text-blue-900 group-active:bg-blue-900 group-active:text-white'}`}>
                                                    {consultMode ? '?' : '+'}
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {cart.length > 0 && (
                                    <div className="space-y-2 pt-4 border-t-2 border-dashed border-slate-200">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Giỏ hàng hiện tại ({cart.length})</div>
                                        {cart.map((item, i) => (
                                            <div key={i} onClick={() => handleEditCartItem(item, i)} className="glass-card p-4 flex justify-between items-center animate-up border-r-4 border-blue-900">
                                                <div className="flex-1">
                                                    <div className="text-sm font-bold uppercase">{item.name} <span className="text-blue-900 font-black">x{item.qty}</span></div>
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase">{item.tl}</div>
                                                    {item.note && <div className="text-[10px] font-bold text-red-500 italic mt-0.5 pre-wrap">📌 {item.note}</div>}
                                                </div>
                                                <div className="text-right font-black text-blue-900">{(item.appliedPrice * item.qty).toLocaleString()}đ</div>
                                            </div>
                                        ))}
                                        <div ref={cartEndRef} className="h-4"></div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'report' && (
                            <div className="space-y-3 animate-up pb-10">
                                <div className="glass-card p-4 flex justify-between items-center">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Tổng thu nhập</span>
                                    <span className="text-xl font-black text-blue-900 italic">{cloudData.sales.reduce((acc, s) => acc + Number(s.total || s['Tổng'] || 0), 0).toLocaleString()}đ</span>
                                </div>
                                <div className="space-y-3">
                                    {cloudData.sales.slice().reverse().map((s, i) => (
                                        <div key={i} onClick={() => handleViewHistory(s)} className="glass-card p-4 flex justify-between items-center active:bg-slate-50">
                                            <div>
                                                <div className="text-sm font-bold uppercase">{s.customer || s['Khách hàng']}</div>
                                                <div className="text-[10px] font-medium text-slate-400">{new Date(s.date || s['Ngày']).toLocaleString('vi-VN')}</div>
                                            </div>
                                            <div className="text-sm font-black text-blue-900 italic">{(Number(s.total || s['Tổng'])).toLocaleString()}đ</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="glass-card p-6 space-y-5 animate-up">
                                <h3 className="font-bold text-lg text-slate-800">Cài đặt kết nối</h3>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Apps Script URL</label>
                                    <textarea className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-mono outline-none focus:ring-2 ring-blue-100" rows="6" value={sheetUrl} onChange={e => {setSheetUrl(e.target.value); localStorage.setItem('KC_POS_URL', e.target.value)}} />
                                </div>
                                <button onClick={() => {fetchData(); setView('pos');}} className="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs active:scale-95 transition shadow-lg">Đồng bộ dữ liệu mới</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t px-10 py-5 flex justify-around items-center z-50 rounded-t-[32px] shadow-lg">
                        <button onClick={() => setView('pos')} className={`flex flex-col items-center ${view === 'pos' ? 'active-tab' : 'text-slate-400'}`}><HomeIcon /><span className="text-[9px] font-bold mt-1 uppercase">Bán hàng</span></button>
                        <button onClick={() => setView('report')} className={`flex flex-col items-center ${view === 'report' ? 'active-tab' : 'text-slate-400'}`}><ChartIcon /><span className="text-[9px] font-bold mt-1 uppercase">Lịch sử</span></button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center ${view === 'settings' ? 'active-tab' : 'text-slate-400'}`}>⚙️<span className="text-[9px] font-bold mt-1 uppercase">Cài đặt</span></button>
                    </nav>

                    {view === 'pos' && cart.length > 0 && !selectingItem && !consultingItem && (
                        <div className="fixed bottom-28 inset-x-5 z-40 animate-up">
                            <button onClick={saveOrder} className="w-full bg-blue-900 text-white p-5 rounded-[24px] shadow-2xl flex justify-between items-center active:scale-95 transition ring-4 ring-white">
                                <div className="text-left">
                                    <div className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Tổng tiền hóa đơn</div>
                                    <div className="text-2xl font-black italic">{cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0).toLocaleString()}đ</div>
                                </div>
                                <div className="bg-white/20 px-6 py-2.5 rounded-full font-bold text-[11px] uppercase tracking-widest">XUẤT BILL ➔</div>
                            </button>
                        </div>
                    )}

                    {/* CHI TIẾT TƯ VẤN ƯU ĐIỂM */}
                    {consultingItem && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 space-y-6 animate-up shadow-2xl border-2 border-blue-900/10">
                                <div className="text-center space-y-2">
                                    <div className="flex justify-center mb-4">
                                        <div className="p-4 bg-blue-50 rounded-full text-blue-900"><StarIcon /></div>
                                    </div>
                                    <div className="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">Ưu điểm sản phẩm</div>
                                    <h3 className="text-2xl font-black text-slate-800 uppercase leading-tight">{consultingItem.name}</h3>
                                    <div className="text-blue-900 font-black italic text-xl">{Number(consultingItem.price).toLocaleString()}đ</div>
                                </div>
                                
                                <div className="bg-blue-900 p-6 rounded-[32px] text-white shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><StarIcon /></div>
                                    <div className="text-[10px] font-black text-blue-300 uppercase tracking-widest mb-3">Tại sao nên mua?</div>
                                    <p className="text-sm font-medium leading-relaxed italic pre-wrap">
                                        {consultingItem.uudiem || 'Sản phẩm đạt chuẩn chất lượng cao, an toàn cho sức khỏe, thiết kế đẹp và đang là lựa chọn hàng đầu của người tiêu dùng Bình Phước.'}
                                    </p>
                                </div>

                                <div className="flex flex-col gap-3 pt-2">
                                    <button 
                                        onClick={() => {
                                            const p = consultingItem;
                                            setConsultingItem(null);
                                            handleSelectItem(p);
                                        }} 
                                        className="w-full bg-blue-900 text-white py-5 rounded-[24px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition"
                                    >
                                        🛒 Thêm vào đơn hàng
                                    </button>
                                    <button 
                                        onClick={() => setConsultingItem(null)} 
                                        className="w-full py-4 font-black text-slate-400 uppercase text-xs tracking-widest"
                                    >
                                        ✕ Để em xem sản phẩm khác
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NHẬP SỐ LƯỢNG & GHI CHÚ RIÊNG */}
                    {selectingItem && (
                        <div className="fixed inset-0 bg-black/60 z-[120] flex items-end p-4 backdrop-blur-sm">
                            <div className="bg-white w-full p-7 rounded-t-[40px] space-y-6 animate-up shadow-2xl">
                                <div className="text-center">
                                    <div className="text-[10px] font-black text-blue-900 uppercase tracking-[0.2em] mb-2">{selectingItem.name}</div>
                                    <div className="text-xs text-slate-400 uppercase font-bold">{selectingItem.tl || selectingItem.TL}</div>
                                </div>
                                <div className="flex items-center justify-between bg-slate-50 p-6 rounded-3xl">
                                    <button onClick={() => setInputQty(Math.max(0.1, parseFloat(inputQty || 1) - 1))} className="w-14 h-14 bg-white rounded-full shadow-lg text-2xl font-bold flex items-center justify-center active:bg-slate-100">-</button>
                                    <input type="number" className="w-32 bg-transparent text-center text-5xl font-black italic outline-none text-blue-900" value={inputQty} onChange={(e) => setInputQty(e.target.value)} onFocus={(e) => e.target.select()} />
                                    <button onClick={() => setInputQty(parseFloat(inputQty || 0) + 1)} className="w-14 h-14 bg-white rounded-full shadow-lg text-2xl font-bold flex items-center justify-center active:bg-slate-100">+</button>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Ghi chú riêng cho sản phẩm này</label>
                                    <textarea 
                                        className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-center italic text-blue-900 border focus:border-blue-300 min-h-[80px] resize-none" 
                                        placeholder="Khuyến mãi đi kèm hoặc yêu cầu đặc biệt..." 
                                        value={inputNote} 
                                        onChange={e => setInputNote(e.target.value)} 
                                    />
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setSelectingItem(null)} className="flex-1 py-5 font-bold text-slate-400 uppercase">Hủy</button>
                                    <button onClick={handleUpdateCart} className="flex-[2] bg-blue-900 text-white py-5 rounded-[24px] font-bold uppercase tracking-[0.2em] shadow-xl">{isEditing ? 'Cập nhật' : 'Xác nhận mua'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showBill && (
                        <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md flex flex-col justify-end">
                            <div className="bg-white w-full rounded-t-[40px] p-6 space-y-4 animate-up overflow-hidden flex flex-col max-h-[95vh]">
                                <div className="flex-1 overflow-y-auto rounded-3xl no-scrollbar flex justify-center">
                                    {billImg ? <img src={billImg} className="max-w-full h-auto shadow-2xl" /> : <div className="h-64 flex items-center justify-center font-black text-blue-900 animate-pulse uppercase tracking-widest text-center">Đang kết xuất hóa đơn...</div>}
                                </div>
                                <button onClick={() => { setShowBill(false); setBillImg(null); if(!previewData){ setCart([]); setCustomer('Khách lẻ'); setOrderNote(''); fetchData(); } setPreviewData(null); }} className="w-full py-5 bg-blue-900 text-white rounded-[24px] font-black uppercase tracking-widest text-xs shadow-xl">Hoàn tất đơn hàng</button>
                            </div>
                        </div>
                    )}

                    {/* PHẦN VẼ HÓA ĐƠN ĐỂ CHỤP ẢNH */}
                    <div className="fixed -left-[9999px] top-0">
                        <div ref={receiptRef} className="bill-container">
                            <div className="text-center mb-6">
                                <h1 className="text-4xl font-bold bill-navy tracking-widest uppercase">CƯỜNG – BÌNH PHƯỚC</h1>
                                <div className="flex justify-center items-center gap-2 bill-navy my-2 opacity-30">
                                    <span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span>
                                </div>
                                <h2 className="text-3xl font-bold bill-navy uppercase tracking-widest mb-1">HÓA ĐƠN BÁN HÀNG</h2>
                                <p className="text-lg font-bold text-slate-500">{previewData ? previewData.id : 'HD' + Date.now().toString().slice(-8)} – {previewData ? previewData.date : new Date().toLocaleString('vi-VN')}</p>
                            </div>

                            <div className="border-t border-dashed border-slate-300 py-6 space-y-2 text-xl font-bold">
                                <div><span className="bill-navy">Khách hàng:</span> {previewData ? previewData.customer : customer}</div>
                                <div className="bill-navy">Thông tin chi tiết đơn hàng:</div>
                                <div className="pl-4 bill-navy italic opacity-80 pre-wrap">
                                    { (previewData ? previewData.note : orderNote) || "Không ghi chú" }
                                </div>
                            </div>

                            <div className="border-t-2 bill-border-navy mt-4">
                                <div className="flex justify-between py-3 px-2 text-lg font-bold bill-navy border-b bill-border-navy">
                                    <div className="flex gap-4"><span>SL</span><span>Giá lẻ</span></div>
                                    <div>Tiền hàng</div>
                                </div>
                                
                                {(previewData ? previewData.items : cart).map((item, i) => (
                                    <div key={i} className="py-6 border-b border-dashed border-slate-300">
                                        <div className="text-2xl font-black uppercase mb-1">{i+1}. {item.name}</div>
                                        {item.tl && <div className="text-lg font-bold text-slate-500 italic ml-4">({item.tl})</div>}
                                        <div className="flex justify-between items-end mt-3 ml-4">
                                            <div className="text-xl font-bold">{item.qty} x {Number(item.appliedPrice).toLocaleString()}</div>
                                            <div className="text-2xl font-black italic">{(item.appliedPrice * item.qty).toLocaleString()}</div>
                                        </div>
                                        {item.note && (
                                            <div className="text-lg font-bold text-red-600 italic ml-4 mt-2 bg-red-50 p-2 rounded border border-red-100 pre-wrap">
                                                🎁 {item.note}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="flex justify-between items-center mt-10 py-6 border-t-4 bill-border-navy">
                                <span className="text-3xl font-black bill-navy uppercase tracking-widest">Tổng tiền phải trả</span>
                                <span className="text-4xl font-black bill-navy italic">
                                    {Number(previewData ? previewData.total : cart.reduce((acc, i) => acc + (i.appliedPrice * i.qty), 0)).toLocaleString()}đ
                                </span>
                            </div>

                            <div className="mt-16 text-center space-y-6">
                                <div className="text-2xl font-black bill-navy uppercase tracking-[0.2em]">Cảm ơn quý khách đã tin tưởng!<br/>Hẹn sớm gặp lại</div>
                                <div className="text-3xl bill-navy">♡</div>
                                <div className="flex justify-center items-center gap-2 bill-navy opacity-30">
                                    <span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span><span>❀</span><span>—</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {loading && <div className="fixed inset-0 bg-white/60 z-[300] flex items-center justify-center font-black text-blue-900 animate-pulse uppercase tracking-[0.2em]">Đang đồng bộ...</div>}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
